---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-module-monitoring-ruup-amadeus-net-v1alpha1-blackboxmodule
  failurePolicy: Fail
  name: vblackboxmodule.kb.io
  rules:
  - apiGroups:
    - module.monitoring.ruup.amadeus.net
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - blackboxmodules
  sideEffects: None
